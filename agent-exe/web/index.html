<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StretPOS Agent</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background: #f8fafc; color: #0f172a; }
      .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; max-width: 760px; }
      h1 { margin-top: 0; font-size: 20px; }
      label { display: block; margin-top: 10px; font-weight: 600; font-size: 13px; }
      input { width: 100%; height: 36px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 0 10px; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      button { margin-top: 14px; height: 36px; border: 0; border-radius: 8px; background: #0ea5e9; color: white; font-weight: 700; padding: 0 14px; cursor: pointer; }
      .muted { color: #64748b; font-size: 12px; margin-top: 8px; }
      .status { margin-top: 12px; padding: 10px; border-radius: 8px; background: #f1f5f9; font-size: 13px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>StretPOS 摄像头代理 Agent</h1>
      <div class="row">
        <div>
          <label>账号 ID</label>
          <input id="accountId" />
        </div>
        <div>
          <label>API 地址</label>
          <input id="apiBase" />
        </div>
      </div>
      <label>接入令牌（推荐）</label>
      <input id="enrollToken" />
      <label>全局 API Key（可选）</label>
      <input id="apiKey" />
      <label>RTSP 地址</label>
      <input id="rtspUrl" />
      <div class="row">
        <div>
          <label>Vendor</label>
          <input id="vendor" />
        </div>
        <div>
          <label>心跳秒数</label>
          <input id="heartbeatSeconds" />
        </div>
      </div>
      <button id="saveBtn">保存并重启 Agent</button>
      <button id="startupBtn" style="background:#0f172a">设置开机自启</button>
      <div class="muted">保存后自动重启后台循环；状态在下方实时刷新。</div>
      <div id="status" class="status">加载中...</div>
    </div>
    <script>
      const ids = ["accountId","apiBase","enrollToken","apiKey","rtspUrl","vendor","heartbeatSeconds"];
      const statusEl = document.getElementById("status");
      const fill = (cfg) => ids.forEach((k)=>{ const el=document.getElementById(k); if(el) el.value = cfg[k] ?? ""; });
      const read = () => Object.fromEntries(ids.map((k)=>[k, document.getElementById(k).value]));
      async function refresh() {
        const r = await fetch("/api/status");
        const data = await r.json();
        fill(data.config || {});
        statusEl.textContent = JSON.stringify(data, null, 2);
      }
      document.getElementById("saveBtn").onclick = async () => {
        await fetch("/api/config", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(read()) });
        await refresh();
      };
      document.getElementById("startupBtn").onclick = async () => {
        await fetch("/api/startup", { method:"POST" });
        await refresh();
      };
      refresh();
      setInterval(refresh, 4000);
    </script>
  </body>
</html>
